<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="robots" content="noindex">
<title>倉庫ツール</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#37474f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="倉庫ツール">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="zxing.min.js"></script>
<!-- 高精度デコーダ zxing-cpp(WASM)。反転/回転に強くiPhoneの標準カメラ級。読み込めない時は上の旧JS版にフォールバック -->
<script type="module">
  try{
    const m = await import("https://cdn.jsdelivr.net/npm/zxing-wasm@2.2.4/dist/es/reader/index.js");
    window.zxingReadBarcodes = m.readBarcodes;
    m.readBarcodes(new ImageData(2,2),{formats:["QRCode"]}).catch(()=>{});   // wasm事前読込（初回遅延減）
  }catch(e){ /* CDN不可時は旧JS版で動作 */ }
</script>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;font-family:system-ui,sans-serif;background:#f4f5f7;color:#222;}
  header{background:#37474f;color:#fff;padding:10px 14px;font-size:18px;font-weight:bold;position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;}
  #btnHome{display:none;background:#546e7a;color:#fff;border:0;border-radius:6px;padding:6px 12px;font-size:14px;font-weight:bold;}
  /* メニュー */
  #home{padding:24px 16px;}
  .menu-btn{display:block;width:100%;margin:0 0 16px;padding:26px;border:0;border-radius:14px;color:#fff;font-size:24px;font-weight:bold;box-shadow:0 2px 6px rgba(0,0,0,.15);}
  .menu-btn small{display:block;margin-top:6px;font-size:14px;font-weight:normal;opacity:.9;}
  .menu-btn.kenpin{background:#1565c0;}
  .menu-btn.stock{background:#00695c;}
  .menu-btn.shukko{background:#ef6c00;}
  /* スキャン共通 */
  #reader{width:100%;max-width:480px;margin:0 auto;height:22vh;overflow:hidden;background:#000;border-radius:8px;}
  body.qrmode #reader{width:22vh;max-width:22vh;height:22vh;}   /* 伝票QR読取時は四角（高さそのまま） */
  #reader video,#reader canvas{width:100%!important;height:100%!important;object-fit:cover;display:block;}
  .btnrow{display:flex;gap:8px;padding:10px 14px;}
  .btnrow button{flex:1;padding:14px;font-size:16px;border:0;border-radius:8px;color:#fff;font-weight:bold;}
  .b-scan{background:#2e7d32;}.b-stop{background:#757575;}.b-reset{background:#c62828;}
  #msg{padding:6px 14px;font-size:15px;min-height:20px;}
  .ok{color:#2e7d32;font-weight:bold;}.ng{color:#c62828;font-weight:bold;}
  #dbg{padding:2px 14px;font-size:11px;color:#999;word-break:break-all;}
  /* 検品 */
  #info{padding:8px 14px;background:#fff;border-bottom:1px solid #ddd;font-size:14px;}
  #info b{font-size:16px;}
  table{width:100%;border-collapse:collapse;background:#fff;}
  th,td{padding:8px 6px;border-bottom:1px solid #eee;font-size:14px;text-align:left;}
  th{background:#eceff1;}
  td.q{text-align:center;white-space:nowrap;font-weight:bold;}
  tr.done{background:#e8f5e9;}tr.done td{color:#558b5a;}
  tr.skip{background:#fafafa;color:#999;}
  .pill{display:inline-block;min-width:46px;text-align:center;padding:2px 6px;border-radius:12px;font-size:13px;}
  .pill.g{background:#2e7d32;color:#fff;}.pill.y{background:#ffd54f;color:#333;}
  #done{display:none;padding:16px;margin:10px 14px;background:#2e7d32;color:#fff;border-radius:10px;font-size:20px;text-align:center;font-weight:bold;}
  /* 在庫検索 */
  .card{background:#fff;margin:8px 14px;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.12);overflow:hidden;display:none;}
  .card .hd{padding:10px 14px;border-bottom:1px solid #eee;}
  .nm{font-size:18px;font-weight:bold;}.sub{margin-top:4px;font-size:14px;color:#444;}
  .tana{display:inline-block;background:#00695c;color:#fff;border-radius:6px;padding:2px 10px;font-weight:bold;font-size:16px;}
  .tot{float:right;font-size:22px;font-weight:bold;color:#00695c;}
  td.r,th.r{text-align:right;}
  #flash{position:fixed;inset:0;pointer-events:none;opacity:0;z-index:50;}
  #flash.g{background:#4caf50;}#flash.r{background:#f44336;}
  /* 在庫検索ローディング */
  #loading{display:none;text-align:center;padding:48px 14px;}
  .spinner{width:46px;height:46px;border:5px solid #cce8e3;border-top-color:#00695c;border-radius:50%;margin:0 auto;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  #stockErr{display:none;padding:18px 14px;color:#c62828;font-weight:bold;font-size:16px;}
</style>
</head>
<body>
<header><span id="title">📋 メニュー</span><button id="btnHome" onclick="goHome()">≡ メニュー</button></header>

<!-- メニュー -->
<div id="home">
  <button class="menu-btn kenpin" onclick="openKenpin()">📦 検品<small>伝票QR → 商品を照合</small></button>
  <button class="menu-btn stock" onclick="openStock()">🔍 在庫検索<small>商品バーコード → 在庫確認</small></button>
  <button class="menu-btn shukko" onclick="openShukko()">🚚 出庫リスト<small>配送ルート別のピッキング</small></button>
</div>

<!-- スキャン（共通） -->
<div id="scan" style="display:none;">
  <div id="reader"></div>
  <div class="btnrow">
    <button class="b-scan" id="btnScan">📷 開始</button>
    <button class="b-stop" id="btnTorch">🔦 ライト</button>
    <button class="b-stop" id="btnStop">⏸ 停止</button>
    <button class="b-reset" id="btnReset" style="display:none;">🔄 別伝票</button>
  </div>
  <div id="manualrow" style="display:flex;gap:6px;padding:4px 14px 6px;">
    <input id="manualIn" inputmode="numeric" autocomplete="off" placeholder="読み取れない時は 1498… の番号を入力" style="flex:1;padding:10px;border:1px solid #ccc;border-radius:8px;font-size:15px;">
    <button id="btnManual" style="padding:10px 16px;border:0;border-radius:8px;background:#455a64;color:#fff;font-weight:bold;">照会</button>
  </div>
  <div id="msg"></div>
  <div id="dbg">読取データ: （まだ）</div>
</div>

<!-- 検品の表示 -->
<div id="kenpinResult" style="display:none;">
  <div id="info"></div>
  <div id="done">✅ 検品完了（全て一致）</div>
  <table><thead><tr><th>商品名</th><th>ロット</th><th class="q">数量</th><th class="q">読</th></tr></thead><tbody id="tb"></tbody></table>
</div>

<!-- 在庫検索の表示 -->
<div id="stockResult" style="display:none;">
  <div id="stockErr"></div>
  <button id="btnNext" style="display:none;width:calc(100% - 28px);margin:12px 14px;padding:16px;border:0;border-radius:10px;background:#00695c;color:#fff;font-size:18px;font-weight:bold;">🔄 次の商品をスキャン</button>
  <div class="card" id="card">
    <div class="hd"><span class="tot" id="tot"></span><div class="nm" id="nm"></div>
      <div class="sub">棚番 <span class="tana" id="stana"></span>　商品CD <span id="scd"></span></div>
      <div class="sub"><span style="background:#eceff1;border-radius:5px;padding:2px 8px;margin-right:6px;">適正 <b id="stekisei"></b></span><span style="background:#eceff1;border-radius:5px;padding:2px 8px;margin-right:6px;">発注 <b id="shatchu"></b></span><span style="background:#e3f2fd;border-radius:5px;padding:2px 8px;">先月 <b id="sgetu"></b></span></div>
      <div class="sub" id="sbiko" style="color:#bf6a00;"></div>
      <div class="sub" id="updated" style="color:#888;font-size:12px;"></div></div>
    <table><thead><tr><th>ロット</th><th class="r">在庫</th><th>使用期限</th><th>入荷日</th><th>備考</th></tr></thead><tbody id="lots"></tbody></table>
  </div>
</div>
<!-- 照会中（検品・在庫検索 共通）-->
<div id="loading"><div class="spinner"></div><div style="margin-top:14px;font-size:16px;color:#00695c;font-weight:bold;">照会中...</div></div>
<div id="flash"></div>

<script>
// ▼ Apps ScriptのウェブアプリURL
const APPS_URL = "https://script.google.com/macros/s/AKfycbxe7-GFzt6NF3TzfaIOfM-JM3YpWthCLMwbaF22KPBB7vbXmuOd-dRGYMikTxPqatMc/exec";
const SHUKKO_URL = "https://script.google.com/macros/s/AKfycbzMRldtxxFBD3rJKIEEz9-HnpcawxGGm4h84CPG09fnVXg2TKPfMtUhR_zks7GT-4Qu/exec";
const OUT_SS = "1seWjCprsG-jSVH2RtrcSbOxO59WFAbW7ijiMNrMpbeM";   // 出庫スプシ（伝票一覧・検品済ログを直読み＝照会を高速化）
const ACCESS_PIN = "";

let app="home";          // home / kenpin / stock
let mode="denpyo";       // 検品サブ: denpyo / item
let data=null, scanned={}, lastCode="", lastTime=0;
const $=id=>document.getElementById(id);

function flash(c){const f=$("flash");f.className=c;f.style.transition="none";f.style.opacity="0.5";
  setTimeout(()=>{f.style.transition="opacity .4s";f.style.opacity="0";},30);
  if(navigator.vibrate)navigator.vibrate(c==="g"?55:[80,50,80]);}
function beep(ok){try{const c=new(window.AudioContext||window.webkitAudioContext)();const o=c.createOscillator(),g=c.createGain();
  o.connect(g);g.connect(c.destination);o.frequency.value=ok?880:220;o.start();
  g.gain.setValueAtTime(0.2,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.2);o.stop(c.currentTime+0.2);}catch(e){}}
function normBC(s){return String(s||"").replace(/[^0-9]/g,"");}
function fmtDay(s){if(!s)return"";const d=new Date(s);if(isNaN(d))return String(s);
  return d.getFullYear()+'/'+('0'+(d.getMonth()+1)).slice(-2)+'/'+('0'+d.getDate()).slice(-2);}
function fmtExp(s){s=String(s||"");                       // 使用期限を YYYY/MM に
  if(/[A-Za-z]/.test(s)){const d=new Date(s);if(!isNaN(d))return d.getFullYear()+'/'+('0'+(d.getMonth()+1)).slice(-2);}
  const m=s.match(/(\d{4})[\/\-](\d{1,2})/);return m?m[1]+'/'+('0'+m[2]).slice(-2):s;}
function extractGTIN(raw){let s=String(raw).replace(/^\][A-Za-z0-9]/,'').replace(/[()]/g,'');
  if(s.startsWith('01')&&/^\d{14}/.test(s.slice(2)))return s.slice(2,16);
  const m=String(raw).match(/\(?01\)?(\d{14})/);return m?m[1]:null;}
// 箱(先頭2)・ピース(先頭1)・JAN 全てを同一商品として照合するための真ん中12桁（荷姿と末尾CDを除く）
function core12(code){const g=extractGTIN(code);const d=g||normBC(code);
  if(d.length===14)return d.substring(1,13);
  if(d.length===13)return d.substring(0,12);
  return '';}

function jsonp(params){return new Promise(res=>{
  const name='cb'+Date.now()+Math.floor(Math.random()*1000);
  window[name]=d=>{delete window[name];s.remove();res(d);};
  const s=document.createElement('script');
  s.src=APPS_URL+'?'+Object.entries(params).map(([k,v])=>k+'='+encodeURIComponent(v)).join('&')+'&callback='+name;
  s.onerror=()=>{delete window[name];s.remove();res({ok:false,error:'通信エラー'});};
  document.body.appendChild(s);});}
function showLoad(){$("scan").style.display="none";$("kenpinResult").style.display="none";$("stockResult").style.display="none";$("loading").style.display="block";}
function hideLoad(){$("loading").style.display="none";}

/* ===== 伝票一覧の先読み（照会を一瞬にする）=====
   検品を開いた時点で伝票一覧＋検品済ログをスプシから直読みしておき、QR読取時はスマホ内で即照会。
   読み込み前や見つからない時は従来のApps Script照会に自動フォールバック。 */
let dnRows=null, dnIdx=null, dnLog=null, dnMik=null, dnLoadedAt=0;
function gvCell(row,i){const c=row.c[i];return c?(c.f!=null?c.f:(c.v!=null?String(c.v):"")):"";}
function gvNum(row,i){const c=row.c[i];return (c&&c.v!=null)?Number(c.v):0;}
function preloadDenpyo(force){
  const now=Date.now();
  if(!force && dnRows && now-dnLoadedAt<5*60*1000) return;   // 5分以内なら再利用
  const base="https://docs.google.com/spreadsheets/d/"+OUT_SS+"/gviz/tq";
  const load=src=>{const s=document.createElement("script");s.src=src;s.onerror=()=>{};document.body.appendChild(s);};
  load(base+"?sheet="+encodeURIComponent("伝票一覧")+"&tqx=responseHandler:onDnBody");
  load(base+"?sheet="+encodeURIComponent("検品済ログ")+"&tqx=responseHandler:onDnLog");
  load(base+"?sheet="+encodeURIComponent("未検品一覧")+"&tqx=responseHandler:onDnMik");
}
// 未検品一覧（A列=取引NO）。ここに載っている＝まだ検品していない。載っていない＝ハンディーで検品済み。
window.onDnMik=function(resp){
  try{
    dnMik={};
    if(resp.status!=="ok")return;
    const rows=resp.table.rows;
    for(let i=0;i<rows.length;i++){
      const no=String(gvCell(rows[i],0)).replace(/[^0-9]/g,"");
      if(no&&no!=="") dnMik[no]=true;
    }
    // ヘッダー行'取引NO'は数字化されず除外される
  }catch(e){ dnMik=null; }
};
window.onDnBody=function(resp){
  try{
    if(resp.status!=="ok")return;
    const rows=resp.table.rows;
    // ヘッダーは1行目（数値列では文字が落ちるため、文字列で残っている列名＋既知の並びで補完）
    const KNOWN=['伝票日付','伝票番号','伝票行番号','区分名','得意先cd','得意先名','商品cd','商品名','包装単位名','ロットNO','使用期限','数量','単価','合計','jan','gtin'];
    dnIdx={}; KNOWN.forEach((k,i)=>dnIdx[k]=i);
    dnRows=rows; dnLoadedAt=Date.now();
  }catch(e){}
};
window.onDnLog=function(resp){
  try{
    dnLog={};
    if(resp.status!=="ok")return;
    const rows=resp.table.rows;
    // 検品済ログタブが未作成だと別タブが返るためヘッダー検証（A1=取引NO のときだけ採用）
    if(!rows.length || gvCell(rows[0],0)!=="取引NO"){ if(rows.length&&/^\d+$/.test(gvCell(rows[0],0))){/*ヘッダーが数値列で落ちた場合は列構成で判断*/}else return; }
    for(let i=0;i<rows.length;i++){
      const no=String(gvCell(rows[i],0)).replace(/[^0-9]/g,"");
      if(no) dnLog[no]=gvCell(rows[i],2);   // 最終行が最新
    }
  }catch(e){ dnLog={}; }
};
function lookupLocal(qr){
  if(!dnRows||!dnIdx)return null;
  const digits=String(qr).replace(/[^0-9]/g,"");
  const no=(digits.charAt(0)==="1"&&digits.length>1)?digits.substring(1):digits;
  if(!no)return null;
  const ib=dnIdx, items=[]; let toku="", day="";
  for(let r=1;r<dnRows.length;r++){
    const row=dnRows[r];
    if(String(gvCell(row,ib['伝票番号'])).replace(/[^0-9]/g,"")!==no)continue;
    toku=toku||gvCell(row,ib['得意先名']); day=day||gvCell(row,ib['伝票日付']);
    const jan=gvCell(row,ib['jan']).trim(), gtin=gvCell(row,ib['gtin']).trim();
    items.push({商品名:gvCell(row,ib['商品名']).trim(), 数量:gvNum(row,ib['数量']),
      ロット:gvCell(row,ib['ロットNO']).trim(), 商品cd:gvCell(row,ib['商品cd']).trim(),
      jan:jan, gtin:gtin, scannable:!!(jan||gtin)});
  }
  if(!items.length)return null;   // ローカルに無い→サーバーで再確認（新しい伝票の可能性）
  return {ok:true, 取引NO:no, 得意先:toku, 取引日:day, items:items,
          検品済:(dnLog&&dnLog[no])?dnLog[no]:""};
}
// 手入力欄の文言をモードに合わせる（伝票QR段階＝伝票No. / 商品段階＝1498…）
function setManualHint(){
  $("manualIn").placeholder=(app==="kenpin"&&mode==="denpyo")
    ?"読み取れない場合は伝票No.を入力"
    :"読み取れない時は 1498… の番号を入力";
}

/* ===== 画面遷移 ===== */
function openKenpin(){app="kenpin";mode="denpyo";data=null;scanned={};lastCode="";document.body.className="kenpinmode qrmode";
  $("title").textContent="📦 検品";$("btnHome").style.display="inline-block";$("btnReset").style.display="inline-block";
  $("home").style.display="none";$("scan").style.display="block";$("kenpinResult").style.display="block";$("stockResult").style.display="none";$("loading").style.display="none";
  $("info").textContent="伝票QRを読み取ってください";$("tb").innerHTML="";$("done").style.display="none";$("msg").textContent="";
  setManualHint();preloadDenpyo();startScan();}
function openStock(){app="stock";data=null;lastCode="";document.body.className="stockmode";
  $("title").textContent="🔍 在庫検索";$("btnHome").style.display="inline-block";$("btnReset").style.display="none";
  $("home").style.display="none";$("scan").style.display="block";$("kenpinResult").style.display="none";$("stockResult").style.display="block";
  $("card").style.display="none";$("btnNext").style.display="none";$("loading").style.display="none";$("stockErr").style.display="none";$("msg").textContent="商品のバーコードを読み取ってください";
  setManualHint();preloadStock();startScan();}
function openShukko(){stopScan();window.open(SHUKKO_URL,'_blank')||(location.href=SHUKKO_URL);}
function goHome(){stopScan();app="home";lastCode="";document.body.className="";
  $("title").textContent="📋 メニュー";$("btnHome").style.display="none";$("loading").style.display="none";
  $("home").style.display="block";$("scan").style.display="none";$("kenpinResult").style.display="none";$("stockResult").style.display="none";$("msg").textContent="";}

/* ===== スキャン結果の振り分け ===== */
function onScan(text,fmt){
  $("dbg").textContent='読取'+(fmt?'['+fmt+']':'')+': '+text;
  const now=Date.now(); if(text===lastCode&&now-lastTime<1500)return;
  lastCode=text;lastTime=now;
  if(app==="stock") lookupStock(text);
  else if(app==="kenpin"){ if(mode==="denpyo")loadDenpyo(text); else matchItem(text); }
}

/* ===== 検品 ===== */
async function loadDenpyo(qr){
  stopScan();showLoad();                                   // QR認識→カメラOFF＋照会中（無音・無点滅・無振動）
  let j=lookupLocal(qr);                                   // 先読みデータから即照会（一瞬）
  if(!j){                                                  // 未ロード/見つからない時だけサーバー照会（従来）
    const p={denpyo:qr}; if(ACCESS_PIN)p.pin=ACCESS_PIN;
    j=await jsonp(p);
  }
  hideLoad();$("scan").style.display="block";$("kenpinResult").style.display="block";
  if(!j.ok){ // 伝票なし→QR読取(四角)に戻る
    document.body.className="kenpinmode qrmode";mode="denpyo";data=null;
    $("info").innerHTML='<span class="ng">'+(j.error||"エラー")+'</span>';$("msg").textContent="伝票QRを読み取ってください";
    setManualHint();lastCode="";startScan();return;
  }
  data=j;scanned={};mode="item";document.body.className="kenpinmode";   // 商品スキャンは横長カメラ
  const green=t=>'<span style="background:#2e7d32;color:#fff;border-radius:6px;padding:2px 8px;font-size:13px;white-space:nowrap;">'+t+'</span>';
  let st;
  if(j.検品済){                                    // このアプリで検品完了記録あり
    st=green('✅ 検品済み '+j.検品済);
  }else if(dnMik && !dnMik[j.取引NO]){             // 未検品一覧に載っていない＝ハンディーで検品済み
    st=green('✅ 検品済み（ハンディー）');
  }else{                                           // 未検品一覧に載っている（またはリスト未取得）＝未検品
    st='<span style="background:#ef6c00;color:#fff;border-radius:6px;padding:2px 8px;font-size:13px;">未検品</span>';
  }
  $("info").innerHTML='伝票 <b>'+j.取引NO+'</b>　'+(j.得意先||"")+'　'+fmtDay(j.取引日)+'　'+st;
  $("done").innerHTML='✅ 検品完了（全て一致）';
  renderItems();$("msg").innerHTML='商品のバーコードを順に読み取ってください';
  setManualHint();lastCode="";startScan();}
function findItem(code){
  if(!data)return null;
  const gtin=extractGTIN(code),bc=normBC(code),cc=core12(code);
  let hit=null;
  for(const it of data.items){
    if(!it.scannable)continue;
    const ij=normBC(it.jan),ig=normBC(it.gtin);

function matchItem(code){

function stockLocalLookup(code){
  if(!stRows)return null;

  const match=(j,g)=>{const jj=normBC(j),gg=normBC(g);
    return (gtin&&gtin===gg)||(raw&&(raw===jj||raw===gg))||(cc&&(cc===core12(j)||cc===core12(g)));};

/* ===== スキャンエンジン（BarcodeDetector優先・反転対応・ズーム/ライト）===== */
let stream=null,video=null,detector=null,rafTimer=null,track=null,torchOn=false,scanner=null;
const cvs=document.createElement('canvas'),cx=cvs.getContext('2d',{willReadFrequently:true});

async function startScan(){
  if(stream)return;
  if('BarcodeDetector' in window){
    try{
      const sup=await BarcodeDetector.getSupportedFormats();
      const want=['qr_code','code_128','ean_13','ean_8','itf','data_matrix','code_39','codabar'];
      detector=new BarcodeDetector({formats:sup.filter(f=>want.includes(f))});
      stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1920},height:{ideal:1080}}});
      track=stream.getVideoTracks()[0];
      try{await track.applyConstraints({advanced:[{focusMode:'continuous'}]});}catch(e){}
      video=document.createElement('video');video.setAttribute('playsinline','true');video.muted=true;
      video.srcObject=stream;await video.play();
      const r=$("reader");r.innerHTML='';r.appendChild(video);video.style.width='100%';
      scanLoop();return;
    }catch(e){if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}}
  }
  startZxing();   // iPhone(Safari)等 BarcodeDetector非対応 → ZXingで反転対応読取
}
function annotateCenter(codes,W,H){   // 各コードの中心を0..1で記録（画面中央=0.5,0.5）
  (codes||[]).forEach(c=>{const b=c.boundingBox;
    c._cx=b?(b.x+b.width/2)/W:0.5; c._cy=b?(b.y+b.height/2)/H:0.5;});
  return codes||[];}
async function scanLoop(){
  if(!stream)return;
  let codes=[];
  if(video.videoWidth){
    const w=video.videoWidth,h=video.videoHeight;
    try{codes=annotateCenter((await detector.detect(video))||[],w,h);}catch(e){}
    if(!codes.length){   // 反転（黒地/緑地の白バー対応）を全体で
      const sc=Math.min(1,1280/w),sw=Math.round(w*sc),sh=Math.round(h*sc);
      cvs.width=sw;cvs.height=sh;cx.setTransform(1,0,0,1,0,0);cx.drawImage(video,0,0,sw,sh);
      const im=cx.getImageData(0,0,sw,sh); invBoost(im.data); cx.putImageData(im,0,0);
      try{codes=annotateCenter((await detector.detect(cvs))||[],sw,sh);}catch(e){}
    }
  }
  scanLoop._n=(scanLoop._n||0)+1;
  if(!codes.length && window.zxingReadBarcodes && scanLoop._n%3===0){
    // 標準エンジンで読めない時のWASM＋ズーム再挑戦（緑地/黒地の反転対応）。3フレームに1回に間引き＝通常の認識を速く保つ
    const isDenpyo=(app==="kenpin"&&mode==="denpyo");
    const r=await wasmDecode(isDenpyo, !isDenpyo);
    if(r && (isDenpyo===r.isQR)){ onScan(r.text, r.isQR?'qr':'bar'); rafTimer=setTimeout(scanLoop,60); return; }
  }
  const best=pickBest(codes);
  if(best)onScan(best.rawValue,best.format);
  rafTimer=setTimeout(scanLoop,60);
}
function cDist(c){return Math.hypot((c._cx!=null?c._cx:0.5)-0.5,(c._cy!=null?c._cy:0.5)-0.5);}
function byCenter(a,b){return cDist(a)-cDist(b);}   // 画面中央に近い順
function pickBest(codes){
  if(!codes||!codes.length)return null;
  if(app==="stock"){
    const nonqr=codes.filter(c=>c.format!=="qr_code"); const pool=nonqr.length?nonqr:codes;
    return pool.slice().sort(byCenter)[0];   // 中央に一番近い商品バーコードを採用
  }
  if(app==="kenpin"&&mode==="item"&&data){
    const nonqr=codes.filter(c=>c.format!=="qr_code");
    if(!nonqr.length)return null;
    const inList=nonqr.filter(c=>findItem(c.rawValue));   // 伝票にある商品を優先、その中で中央に近いもの
    return (inList.length?inList:nonqr).slice().sort(byCenter)[0];
  }
  // 検品・伝票読取：QRのみ（中央に近いもの）
  const qr=codes.filter(c=>c.format==="qr_code");
  return qr.length?qr.slice().sort(byCenter)[0]:null;
}
// ===== ZXing版（iPhone等・反転バーコード対応）=====
// QRとバーコードでヒントを分ける＝1D読取時はQR/DataMatrixを外して高速化（iPhoneでも安定）
let zxReader=null, zxHintsQR=null, zxHints1D=null;
function ensureZx(){
  if(zxReader)return;
  zxHintsQR=new Map();
  zxHintsQR.set(ZXing.DecodeHintType.POSSIBLE_FORMATS,[ZXing.BarcodeFormat.QR_CODE]);
  zxHintsQR.set(ZXing.DecodeHintType.TRY_HARDER,true);
  zxHints1D=new Map();
  zxHints1D.set(ZXing.DecodeHintType.POSSIBLE_FORMATS,[
    ZXing.BarcodeFormat.CODE_128,ZXing.BarcodeFormat.EAN_13,ZXing.BarcodeFormat.EAN_8,
    ZXing.BarcodeFormat.ITF,ZXing.BarcodeFormat.CODE_39,ZXing.BarcodeFormat.UPC_A]);
  zxHints1D.set(ZXing.DecodeHintType.TRY_HARDER,true);
  zxReader=new ZXing.MultiFormatReader();
}
async function startZxing(){
  try{ ensureZx(); }
  catch(e){$("msg").innerHTML='<span class="ng">読取ライブラリ初期化失敗: '+e+'</span>';$("dbg").textContent='ZXing初期化NG: '+e;return;}
  try{   // 高解像度＝小さい/高密度の黒地バーコードも細部が残る
    stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:2560},height:{ideal:1440}}});
  }catch(e){
    try{ stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1920},height:{ideal:1080}}}); }
    catch(e2){
      try{ stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}}); }
      catch(e3){$("msg").innerHTML='<span class="ng">カメラ起動失敗: '+e3+'</span>';return;}
    }
  }
  track=stream.getVideoTracks()[0];
  try{   // オートフォーカス＋露出を下げて白飛び防止（黒地/光沢面の読取対策）
    const caps=track.getCapabilities?track.getCapabilities():{},adv=[];
    if(caps.focusMode&&caps.focusMode.indexOf&&caps.focusMode.indexOf('continuous')>=0) adv.push({focusMode:'continuous'});
    else adv.push({focusMode:'continuous'});
    if(caps.exposureMode&&caps.exposureMode.indexOf('continuous')>=0) adv.push({exposureMode:'continuous'});
    if(caps.exposureCompensation&&caps.exposureCompensation.min!=null){
      const ec=caps.exposureCompensation, target=ec.min+(ec.max-ec.min)*0.25;  // 暗め寄り
      adv.push({exposureCompensation:target});
    }
    if(adv.length) await track.applyConstraints({advanced:adv});
  }catch(e){}
  video=document.createElement('video');
  video.setAttribute('playsinline','true');video.setAttribute('muted','true');video.muted=true;video.autoplay=true;
  video.srcObject=stream;
  const r=$("reader");r.innerHTML='';r.appendChild(video);video.style.width='100%';   // DOM追加→再生（iOS対策）
  try{ await video.play(); }catch(e){}
  video._logged=false;
  scanLoopZ();
}
function zxDec(canvas,hints){
  const src=new ZXing.HTMLCanvasElementLuminanceSource(canvas);
  const bins=[ZXing.HybridBinarizer];                       // 2D向け
  if(ZXing.GlobalHistogramBinarizer) bins.push(ZXing.GlobalHistogramBinarizer);  // 1D定番（反転・低コントラストに強い）
  for(const B of bins){
    try{ const r=zxReader.decode(new ZXing.BinaryBitmap(new B(src)), hints); if(r) return r; }
    catch(e){}
    finally{ try{ zxReader.reset(); }catch(e){} }
  }
  return null;
}
// 中央帯を切り出し、適応的(局所)しきい値で純白黒2値化。積分画像で各画素の周辺平均を高速算出し、
// 「局所平均より明るい=白/暗い=黒」で判定。光ムラ・グレア・白飛びに強い（手で影を作るのと同じ効果）。
// inv=trueで白黒反転（白バー→黒バー化＝黒地/緑地の反転バーコード用）。
function zxDrawBandBW(inv){
  const w=video.videoWidth,h=video.videoHeight,by=Math.round(h*0.25),bh=Math.round(h*0.5),sc=Math.min(1,1400/w);
  cx.setTransform(1,0,0,1,0,0);
  const cw=Math.round(w*sc),ch=Math.round(bh*sc);
  cvs.width=cw;cvs.height=ch;cx.drawImage(video,0,by,w,bh,0,0,cw,ch);
  const im=cx.getImageData(0,0,cw,ch),d=im.data,N=cw*ch,g=new Float64Array(N);
  for(let i=0,j=0;i<d.length;i+=4,j++) g[j]=(d[i]*299+d[i+1]*587+d[i+2]*114)/1000;
  const W1=cw+1,I=new Float64Array(W1*(ch+1));           // 積分画像
  for(let y=0;y<ch;y++){let rs=0;for(let x=0;x<cw;x++){rs+=g[y*cw+x];I[(y+1)*W1+(x+1)]=I[y*W1+(x+1)]+rs;}}
  const rad=Math.max(10,Math.round(cw/14)),C=6;
  for(let y=0;y<ch;y++){const y1=y>rad?y-rad:0,y2=y+rad<ch?y+rad:ch-1;
    for(let x=0;x<cw;x++){const x1=x>rad?x-rad:0,x2=x+rad<cw?x+rad:cw-1;
      const area=(x2-x1+1)*(y2-y1+1);
      const s=I[(y2+1)*W1+(x2+1)]-I[y1*W1+(x2+1)]-I[(y2+1)*W1+x1]+I[y1*W1+x1];
      let bw=(g[y*cw+x]*area > s - C*area)?255:0;          // 局所平均-C より明るければ白
      if(inv)bw=255-bw;
      const idx=(y*cw+x)<<2; d[idx]=d[idx+1]=d[idx+2]=bw;}}
  cx.putImageData(im,0,0);
}
// 反転＋グレースケール＋コントラスト伸張。黒地/緑地の白バーを白飛びから救ってくっきり二値化させる
function invBoost(d){
  let mn=255,mx=0;
  for(let i=0;i<d.length;i+=4){const g=255-((d[i]*299+d[i+1]*587+d[i+2]*114)/1000|0);
    d[i]=d[i+1]=d[i+2]=g; if(g<mn)mn=g; if(g>mx)mx=g;}
  const rng=Math.max(1,mx-mn);
  if(rng<230){for(let i=0;i<d.length;i+=4){let v=(d[i]-mn)*255/rng; v=v<0?0:v>255?255:v|0; d[i]=d[i+1]=d[i+2]=v;}}
}
function zxInvert(){const im=cx.getImageData(0,0,cvs.width,cvs.height); invBoost(im.data); cx.putImageData(im,0,0);}
// 映像を cvs に描画。rot=trueで90°回転（縦向きバーコード対策）。長辺1200pxに縮小して高速化
function zxDrawFull(rot){
  const w=video.videoWidth,h=video.videoHeight,sc=Math.min(1,1200/Math.max(w,h));
  const dw=Math.round(w*sc),dh=Math.round(h*sc);
  cx.setTransform(1,0,0,1,0,0);
  if(rot){ cvs.width=dh;cvs.height=dw; cx.translate(dh,0); cx.rotate(Math.PI/2); cx.drawImage(video,0,0,dw,dh); }
  else   { cvs.width=dw;cvs.height=dh; cx.drawImage(video,0,0,dw,dh); }
  cx.setTransform(1,0,0,1,0,0);
}
let zxPhase=0;
const WASM_1D=["Code128","EAN-13","EAN-8","ITF","Code39","UPC-A","UPC-E","DataBar","DataBarExpanded","DataBarLimited","PDF417"];
// zxing-cpp(WASM)で1回読む共通処理。zoom=trueで中央デジタルズーム（細いバー拡大）。iPhone/Android両方から使う
async function wasmDecode(isDenpyo, zoom){
  const w=video.videoWidth,h=video.videoHeight;
  if(!w||!window.zxingReadBarcodes) return null;
  let cw,ch;
  if(zoom){ const cW=Math.round(w*0.72),cH=Math.round(h*0.5),cX=(w-cW)>>1,cY=(h-cH)>>1,up=Math.min(1.5,2200/cW);
    cw=Math.round(cW*up);ch=Math.round(cH*up);
    cvs.width=cw;cvs.height=ch;cx.setTransform(1,0,0,1,0,0);cx.drawImage(video,cX,cY,cW,cH,0,0,cw,ch); }
  else { const sc=Math.min(1,2000/Math.max(w,h));cw=Math.round(w*sc);ch=Math.round(h*sc);
    cvs.width=cw;cvs.height=ch;cx.setTransform(1,0,0,1,0,0);cx.drawImage(video,0,0,cw,ch); }
  let im; try{ im=cx.getImageData(0,0,cw,ch); }catch(e){ return null; }
  try{
    const res=await window.zxingReadBarcodes(im,{formats:isDenpyo?["QRCode"]:WASM_1D,
      tryHarder:true,tryInvert:true,tryRotate:true,tryDownscale:true,tryDenoise:true,maxNumberOfSymbols:1});
    if(res&&res.length&&res[0].text) return {text:res[0].text, isQR:(res[0].format==="QRCode")};
  }catch(e){}
  return null;
}
async function scanLoopZ(){
  if(!stream){return;}
  const w=video.videoWidth,h=video.videoHeight;
  let hit=false;
  if(w){
    const isDenpyo=(app==="kenpin"&&mode==="denpyo");
    if(window.zxingReadBarcodes){
      // ★高精度デコーダ(zxing-cpp WASM)：反転/回転/高密度に強い。商品は1フレームおきにズーム
      if(!video._logged){ video._logged=true; $("dbg").textContent='高精度読取 '+w+'x'+h+' 検出中...'; }
      const r=await wasmDecode(isDenpyo, !isDenpyo && (zxPhase++ & 1));
      if(r && (isDenpyo===r.isQR)){ hit=true; onScan(r.text, r.isQR?'qr':'bar'); }
    }else{
      // フォールバック：旧JS版ZXing
      if(!video._logged){ video._logged=true; $("dbg").textContent='ZX起動 video '+w+'x'+h+' 検出中...'; }
      if(isDenpyo){
        zxDrawFull(false); if(zxPhase++&1) zxInvert();
        const res=zxDec(cvs,zxHintsQR);
        if(res&&res.getBarcodeFormat()===ZXing.BarcodeFormat.QR_CODE){ hit=true; onScan(res.getText(),'qr'); }
      }else{
        const p=zxPhase++ & 3;                 // 0:帯反転 1:帯通常 2:90°反転 3:90°通常
        if(p<2){ zxDrawBandBW(!(p&1)); }
        else { zxDrawFull(true); if(!(p&1)) zxInvert(); }
        const res=zxDec(cvs,zxHints1D);
        if(res&&res.getBarcodeFormat()!==ZXing.BarcodeFormat.QR_CODE){ hit=true; onScan(res.getText(),'bar'); }
      }
    }
  }
  rafTimer=setTimeout(scanLoopZ, hit?600:50);
}
function stopScan(){
  if(rafTimer){clearTimeout(rafTimer);rafTimer=null;}
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;track=null;torchOn=false;$("reader").innerHTML='';}
  if(scanner){scanner.stop().then(()=>{scanner.clear();scanner=null;}).catch(()=>{scanner=null;});}
}
async function toggleTorch(){
  if(!track){$("msg").innerHTML='<span class="ng">先に「開始」を押してください</span>';return;}
  try{const caps=track.getCapabilities?track.getCapabilities():{};
    if(!caps.torch){$("msg").innerHTML='<span class="ng">この端末はライト非対応</span>';return;}
    torchOn=!torchOn;await track.applyConstraints({advanced:[{torch:torchOn}]});}catch(e){}
}
// アプリ化（Service Worker登録）
if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(()=>{}); }
// 起動直後から在庫データを先読み（在庫検索を開く前に準備完了→最初のスキャンから即表示）
preloadStock();

$("btnScan").onclick=startScan;
$("btnTorch").onclick=toggleTorch;
$("btnStop").onclick=stopScan;
// 手入力フォールバック（読めない時は番号を打って照会）。onScanと同じ経路に流す
function manualGo(){const v=$("manualIn").value.trim();if(!v)return;$("manualIn").value="";$("manualIn").blur();lastCode="";onScan(v,'manual');}
$("btnManual").onclick=manualGo;
$("manualIn").addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();manualGo();}});
$("btnNext").onclick=()=>{$("card").style.display="none";$("btnNext").style.display="none";$("stockErr").style.display="none";$("loading").style.display="none";
  $("scan").style.display="block";$("msg").textContent="商品のバーコードを読み取ってください";lastCode="";preloadStock();startScan();};
$("btnReset").onclick=()=>{data=null;scanned={};mode="denpyo";lastCode="";document.body.className="kenpinmode qrmode";
  $("info").textContent="伝票QRを読み取ってください";$("tb").innerHTML="";$("done").style.display="none";$("msg").textContent="";
  setManualHint();preloadDenpyo();};
</script>
