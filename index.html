<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>倉庫ツール</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#37474f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="倉庫ツール">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;font-family:system-ui,sans-serif;background:#f4f5f7;color:#222;}
  header{background:#37474f;color:#fff;padding:10px 14px;font-size:18px;font-weight:bold;position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;}
  #btnHome{display:none;background:#546e7a;color:#fff;border:0;border-radius:6px;padding:6px 12px;font-size:14px;font-weight:bold;}
  /* メニュー */
  #home{padding:24px 16px;}
  .menu-btn{display:block;width:100%;margin:0 0 16px;padding:26px;border:0;border-radius:14px;color:#fff;font-size:24px;font-weight:bold;box-shadow:0 2px 6px rgba(0,0,0,.15);}
  .menu-btn small{display:block;margin-top:6px;font-size:14px;font-weight:normal;opacity:.9;}
  .menu-btn.kenpin{background:#1565c0;}
  .menu-btn.stock{background:#00695c;}
  /* スキャン共通 */
  #reader{width:100%;max-width:480px;margin:0 auto;height:22vh;overflow:hidden;background:#000;border-radius:8px;}
  #reader video,#reader canvas{width:100%!important;height:100%!important;object-fit:cover;display:block;}
  .btnrow{display:flex;gap:8px;padding:10px 14px;}
  .btnrow button{flex:1;padding:14px;font-size:16px;border:0;border-radius:8px;color:#fff;font-weight:bold;}
  .b-scan{background:#2e7d32;}.b-stop{background:#757575;}.b-reset{background:#c62828;}
  #msg{padding:6px 14px;font-size:15px;min-height:20px;}
  .ok{color:#2e7d32;font-weight:bold;}.ng{color:#c62828;font-weight:bold;}
  #dbg{padding:2px 14px;font-size:11px;color:#999;word-break:break-all;}
  /* 検品 */
  #info{padding:8px 14px;background:#fff;border-bottom:1px solid #ddd;font-size:14px;}
  #info b{font-size:16px;}
  table{width:100%;border-collapse:collapse;background:#fff;}
  th,td{padding:8px 6px;border-bottom:1px solid #eee;font-size:14px;text-align:left;}
  th{background:#eceff1;}
  td.q{text-align:center;white-space:nowrap;font-weight:bold;}
  tr.done{background:#e8f5e9;}tr.done td{color:#558b5a;}
  tr.skip{background:#fafafa;color:#999;}
  .pill{display:inline-block;min-width:46px;text-align:center;padding:2px 6px;border-radius:12px;font-size:13px;}
  .pill.g{background:#2e7d32;color:#fff;}.pill.y{background:#ffd54f;color:#333;}
  #done{display:none;padding:16px;margin:10px 14px;background:#2e7d32;color:#fff;border-radius:10px;font-size:20px;text-align:center;font-weight:bold;}
  /* 在庫検索 */
  .card{background:#fff;margin:8px 14px;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.12);overflow:hidden;display:none;}
  .card .hd{padding:10px 14px;border-bottom:1px solid #eee;}
  .nm{font-size:18px;font-weight:bold;}.sub{margin-top:4px;font-size:14px;color:#444;}
  .tana{display:inline-block;background:#00695c;color:#fff;border-radius:6px;padding:2px 10px;font-weight:bold;font-size:16px;}
  .tot{float:right;font-size:22px;font-weight:bold;color:#00695c;}
  td.r,th.r{text-align:right;}
  #flash{position:fixed;inset:0;pointer-events:none;opacity:0;z-index:50;}
  #flash.g{background:#4caf50;}#flash.r{background:#f44336;}
  /* 在庫検索ローディング */
  #loading{display:none;text-align:center;padding:48px 14px;}
  .spinner{width:46px;height:46px;border:5px solid #cce8e3;border-top-color:#00695c;border-radius:50%;margin:0 auto;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  #stockErr{display:none;padding:18px 14px;color:#c62828;font-weight:bold;font-size:16px;}
</style>
</head>
<body>
<header><span id="title">📋 メニュー</span><button id="btnHome" onclick="goHome()">≡ メニュー</button></header>

<!-- メニュー -->
<div id="home">
  <button class="menu-btn kenpin" onclick="openKenpin()">📦 検品<small>伝票QR → 商品を照合</small></button>
  <button class="menu-btn stock" onclick="openStock()">🔍 在庫検索<small>商品バーコード → 在庫確認</small></button>
</div>

<!-- スキャン（共通） -->
<div id="scan" style="display:none;">
  <div id="reader"></div>
  <div class="btnrow">
    <button class="b-scan" id="btnScan">📷 開始</button>
    <button class="b-stop" id="btnTorch">🔦 ライト</button>
    <button class="b-stop" id="btnStop">⏸ 停止</button>
    <button class="b-reset" id="btnReset" style="display:none;">🔄 別伝票</button>
  </div>
  <div id="zoomrow" style="display:none;padding:2px 14px 8px;">🔍 ズーム <input type="range" id="zoom" style="width:calc(100% - 70px);vertical-align:middle;"></div>
  <div id="msg"></div>
  <div id="dbg">読取データ: （まだ）</div>
</div>

<!-- 検品の表示 -->
<div id="kenpinResult" style="display:none;">
  <div id="info"></div>
  <div id="done">✅ 検品完了（全て一致）</div>
  <table><thead><tr><th>商品名</th><th>ロット</th><th class="q">数量</th><th class="q">読</th></tr></thead><tbody id="tb"></tbody></table>
</div>

<!-- 在庫検索の表示 -->
<div id="stockResult" style="display:none;">
  <div id="loading"><div class="spinner"></div><div style="margin-top:14px;font-size:16px;color:#00695c;font-weight:bold;">照会中...</div></div>
  <div id="stockErr"></div>
  <button id="btnNext" style="display:none;width:calc(100% - 28px);margin:12px 14px;padding:16px;border:0;border-radius:10px;background:#00695c;color:#fff;font-size:18px;font-weight:bold;">🔄 次の商品をスキャン</button>
  <div class="card" id="card">
    <div class="hd"><span class="tot" id="tot"></span><div class="nm" id="nm"></div>
      <div class="sub">棚番 <span class="tana" id="stana"></span>　商品CD <span id="scd"></span></div>
      <div class="sub" id="updated" style="color:#888;font-size:12px;"></div></div>
    <table><thead><tr><th>ロット</th><th class="r">在庫</th><th>使用期限</th></tr></thead><tbody id="lots"></tbody></table>
  </div>
</div>
<div id="flash"></div>

<script>
// ▼ Apps ScriptのウェブアプリURL
const APPS_URL = "https://script.google.com/macros/s/AKfycbxe7-GFzt6NF3TzfaIOfM-JM3YpWthCLMwbaF22KPBB7vbXmuOd-dRGYMikTxPqatMc/exec";
const ACCESS_PIN = "";

let app="home";          // home / kenpin / stock
let mode="denpyo";       // 検品サブ: denpyo / item
let data=null, scanned={}, lastCode="", lastTime=0;
const $=id=>document.getElementById(id);

function flash(c){const f=$("flash");f.className=c;f.style.transition="none";f.style.opacity="0.5";
  setTimeout(()=>{f.style.transition="opacity .4s";f.style.opacity="0";},30);
  if(navigator.vibrate)navigator.vibrate(c==="g"?55:[80,50,80]);}
function beep(ok){try{const c=new(window.AudioContext||window.webkitAudioContext)();const o=c.createOscillator(),g=c.createGain();
  o.connect(g);g.connect(c.destination);o.frequency.value=ok?880:220;o.start();
  g.gain.setValueAtTime(0.2,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.2);o.stop(c.currentTime+0.2);}catch(e){}}
function normBC(s){return String(s||"").replace(/[^0-9]/g,"");}
function fmtDay(s){if(!s)return"";const d=new Date(s);if(isNaN(d))return String(s);
  return d.getFullYear()+'/'+('0'+(d.getMonth()+1)).slice(-2)+'/'+('0'+d.getDate()).slice(-2);}
function fmtExp(s){s=String(s||"");                       // 使用期限を YYYY/MM に
  if(/[A-Za-z]/.test(s)){const d=new Date(s);if(!isNaN(d))return d.getFullYear()+'/'+('0'+(d.getMonth()+1)).slice(-2);}
  const m=s.match(/(\d{4})[\/\-](\d{1,2})/);return m?m[1]+'/'+('0'+m[2]).slice(-2):s;}
function extractGTIN(raw){let s=String(raw).replace(/^\][A-Za-z0-9]/,'').replace(/[()]/g,'');
  if(s.startsWith('01')&&/^\d{14}/.test(s.slice(2)))return s.slice(2,16);
  const m=String(raw).match(/\(?01\)?(\d{14})/);return m?m[1]:null;}

function jsonp(params){return new Promise(res=>{
  const name='cb'+Date.now()+Math.floor(Math.random()*1000);
  window[name]=d=>{delete window[name];s.remove();res(d);};
  const s=document.createElement('script');
  s.src=APPS_URL+'?'+Object.entries(params).map(([k,v])=>k+'='+encodeURIComponent(v)).join('&')+'&callback='+name;
  s.onerror=()=>{delete window[name];s.remove();res({ok:false,error:'通信エラー'});};
  document.body.appendChild(s);});}

/* ===== 画面遷移 ===== */
function openKenpin(){app="kenpin";mode="denpyo";data=null;scanned={};lastCode="";document.body.className="kenpinmode";
  $("title").textContent="📦 検品";$("btnHome").style.display="inline-block";$("btnReset").style.display="inline-block";
  $("home").style.display="none";$("scan").style.display="block";$("kenpinResult").style.display="block";$("stockResult").style.display="none";
  $("info").textContent="伝票QRを読み取ってください";$("tb").innerHTML="";$("done").style.display="none";$("msg").textContent="";
  startScan();}
function openStock(){app="stock";data=null;lastCode="";document.body.className="stockmode";
  $("title").textContent="🔍 在庫検索";$("btnHome").style.display="inline-block";$("btnReset").style.display="none";
  $("home").style.display="none";$("scan").style.display="block";$("kenpinResult").style.display="none";$("stockResult").style.display="block";
  $("card").style.display="none";$("btnNext").style.display="none";$("loading").style.display="none";$("stockErr").style.display="none";$("msg").textContent="商品のバーコードを読み取ってください";
  startScan();}
function goHome(){stopScan();app="home";lastCode="";document.body.className="";
  $("title").textContent="📋 メニュー";$("btnHome").style.display="none";
  $("home").style.display="block";$("scan").style.display="none";$("kenpinResult").style.display="none";$("stockResult").style.display="none";$("msg").textContent="";}

/* ===== スキャン結果の振り分け ===== */
function onScan(text,fmt){
  $("dbg").textContent='読取'+(fmt?'['+fmt+']':'')+': '+text;
  const now=Date.now(); if(text===lastCode&&now-lastTime<1500)return;
  lastCode=text;lastTime=now;
  if(app==="stock") lookupStock(text);
  else if(app==="kenpin"){ if(mode==="denpyo")loadDenpyo(text); else matchItem(text); }
}

/* ===== 検品 ===== */
async function loadDenpyo(qr){
  $("msg").textContent="読込中...";
  const p={denpyo:qr}; if(ACCESS_PIN)p.pin=ACCESS_PIN;
  const j=await jsonp(p);
  if(!j.ok){$("msg").innerHTML='<span class="ng">'+(j.error||"エラー")+'</span>';beep(false);flash("r");return;}
  data=j;scanned={};
  $("info").innerHTML='伝票 <b>'+j.取引NO+'</b>　'+(j.得意先||"")+'　'+fmtDay(j.取引日);
  renderItems();mode="item";$("msg").innerHTML='商品のバーコードを順に読み取ってください';beep(true);flash("g");}
function findItem(code){
  if(!data)return null;
  const gtin=extractGTIN(code),bc=normBC(code);
  let hit=null;
  for(const it of data.items){
    if(!it.scannable)continue;
    const ij=normBC(it.jan),ig=normBC(it.gtin);
    const m=(gtin&&gtin===ig)||bc===ij||bc===ig||(ig&&bc===ig.replace(/^0+/,''))||(ij&&bc===ij.replace(/^0+/,''));
    if(m){const need=it.数量,got=scanned[it.商品cd+it.ロット]||0;if(got<need)return it;if(!hit)hit=it;}
  }return hit;}
function matchItem(code){
  if(!data)return;
  const hit=findItem(code);
  if(!hit){const sh=extractGTIN(code)||normBC(code);$("msg").innerHTML='<span class="ng">⚠ この伝票に無い商品です ('+sh+')</span>';beep(false);flash("r");return;}
  const k=hit.商品cd+hit.ロット,need=hit.数量,got=scanned[k]||0;
  if(got>=need){$("msg").innerHTML='<span class="ng">⚠ '+hit.商品名+' は数量超過</span>';beep(false);flash("r");return;}
  scanned[k]=got+1;$("msg").innerHTML='<span class="ok">✓ '+hit.商品名+'</span>';beep(true);flash("g");renderItems();checkDone();}
function renderItems(){
  if(!data){$("tb").innerHTML="";return;}
  let html="";
  for(const it of data.items){
    const k=it.商品cd+it.ロット,need=it.数量,got=scanned[k]||0;let cls="",pill;
    if(!it.scannable){cls="skip";pill='<span class="pill">－</span>';}
    else if(got>=need){cls="done";pill='<span class="pill g">'+got+'/'+need+'</span>';}
    else{pill='<span class="pill y">'+got+'/'+need+'</span>';}
    html+='<tr class="'+cls+'"><td>'+it.商品名+'</td><td>'+it.ロット+'</td><td class="q">'+need+'</td><td class="q">'+pill+'</td></tr>';
  }$("tb").innerHTML=html;}
function checkDone(){
  const all=data.items.filter(it=>it.scannable).every(it=>(scanned[it.商品cd+it.ロット]||0)>=it.数量);
  $("done").style.display=all?"block":"none";
  if(all){beep(true);if(navigator.vibrate)navigator.vibrate([60,40,60,40,120]);}}

/* ===== 在庫検索 ===== */
async function lookupStock(code){
  // 読取→即カメラOFF→「照会中...」ローディング（待って感）。在庫検索は音・フラッシュ・バイブなし
  stopScan();
  $("scan").style.display="none";$("card").style.display="none";$("stockErr").style.display="none";$("btnNext").style.display="none";
  $("loading").style.display="block";
  const p={stock:code}; if(ACCESS_PIN)p.pin=ACCESS_PIN;
  const j=await jsonp(p);
  $("loading").style.display="none";
  if(!j.ok){
    $("stockErr").textContent='⚠ '+(j.error||'該当なし');$("stockErr").style.display="block";$("btnNext").style.display="block";return;
  }
  $("nm").textContent=j.商品名;$("stana").textContent=j.棚番||'-';$("scd").textContent=j.商品CD;
  $("tot").textContent=j.在庫数+' 個';$("tot").style.color=(j.在庫数>0?'#00695c':'#c62828');
  $("lots").innerHTML=(j.lots&&j.lots.length)
    ?j.lots.map(l=>'<tr><td>'+l.lot+'</td><td class="r"><b>'+l.qty+'</b></td><td>'+fmtExp(l.exp)+'</td></tr>').join('')
    :'<tr><td colspan="3" style="text-align:center;color:#c62828;font-weight:bold;">在庫なし</td></tr>';
  $("updated").textContent=j.updatedAt?('在庫 '+j.updatedAt.slice(5)+' 時点'):'';
  $("card").style.display='block';$("btnNext").style.display='block';}

/* ===== スキャンエンジン（BarcodeDetector優先・反転対応・ズーム/ライト）===== */
let stream=null,video=null,detector=null,rafTimer=null,track=null,torchOn=false,scanner=null;
const cvs=document.createElement('canvas'),cx=cvs.getContext('2d',{willReadFrequently:true});

async function startScan(){
  if(stream)return;
  if('BarcodeDetector' in window){
    try{
      const sup=await BarcodeDetector.getSupportedFormats();
      const want=['qr_code','code_128','ean_13','ean_8','itf','data_matrix','code_39','codabar'];
      detector=new BarcodeDetector({formats:sup.filter(f=>want.includes(f))});
      stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1920},height:{ideal:1080}}});
      track=stream.getVideoTracks()[0];
      try{await track.applyConstraints({advanced:[{focusMode:'continuous'}]});}catch(e){}
      video=document.createElement('video');video.setAttribute('playsinline','true');video.muted=true;
      video.srcObject=stream;await video.play();
      const r=$("reader");r.innerHTML='';r.appendChild(video);video.style.width='100%';
      setupZoom();scanLoop();return;
    }catch(e){if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}}
  }
  startH5();
}
async function scanLoop(){
  if(!stream)return;
  let codes=[];
  try{codes=(await detector.detect(video))||[];}catch(e){}
  if(!codes.length && video.videoWidth){
    try{
      const w=video.videoWidth,h=video.videoHeight,sc=Math.min(1,1100/w),sw=Math.round(w*sc),sh=Math.round(h*sc);
      cvs.width=sw;cvs.height=sh;cx.drawImage(video,0,0,sw,sh);
      const im=cx.getImageData(0,0,sw,sh),d=im.data;
      for(let i=0;i<d.length;i+=4){d[i]=255-d[i];d[i+1]=255-d[i+1];d[i+2]=255-d[i+2];}
      cx.putImageData(im,0,0);codes=(await detector.detect(cvs))||[];
    }catch(e){}
  }
  const best=pickBest(codes);
  if(best)onScan(best.rawValue,best.format);
  rafTimer=setTimeout(scanLoop,60);
}
function pickBest(codes){
  if(!codes||!codes.length)return null;
  const pri={code_128:5,data_matrix:4,ean_13:3,ean_8:3,itf:2,code_39:1,qr_code:0};
  if(app==="stock"){
    const nonqr=codes.filter(c=>c.format!=="qr_code"); const pool=nonqr.length?nonqr:codes;
    return pool.slice().sort((a,b)=>(pri[b.format]||0)-(pri[a.format]||0))[0];
  }
  if(app==="kenpin"&&mode==="item"&&data){
    const nonqr=codes.filter(c=>c.format!=="qr_code");
    if(!nonqr.length)return null;
    for(const c of nonqr){if(findItem(c.rawValue))return c;}
    return nonqr.slice().sort((a,b)=>(pri[b.format]||0)-(pri[a.format]||0))[0];
  }
  // 検品・伝票読取：QRのみ
  for(const c of codes){if(c.format==="qr_code")return c;}
  return null;
}
function startH5(){
  if(scanner)return;
  scanner=new Html5Qrcode("reader",{formatsToSupport:[
    Html5QrcodeSupportedFormats.QR_CODE,Html5QrcodeSupportedFormats.EAN_13,Html5QrcodeSupportedFormats.EAN_8,
    Html5QrcodeSupportedFormats.CODE_128,Html5QrcodeSupportedFormats.ITF,Html5QrcodeSupportedFormats.DATA_MATRIX,
    Html5QrcodeSupportedFormats.CODE_39],experimentalFeatures:{useBarCodeDetectorIfSupported:true}});
  scanner.start({facingMode:"environment"},{fps:15,videoConstraints:{facingMode:"environment",width:{ideal:1920},height:{ideal:1080}}},
    (t)=>onScan(t),()=>{}).catch(e=>{$("msg").innerHTML='<span class="ng">カメラ起動失敗: '+e+'</span>';scanner=null;});
}
function stopScan(){
  if(rafTimer){clearTimeout(rafTimer);rafTimer=null;}
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;track=null;torchOn=false;$("reader").innerHTML='';$("zoomrow").style.display='none';}
  if(scanner){scanner.stop().then(()=>{scanner.clear();scanner=null;}).catch(()=>{scanner=null;});}
}
function setupZoom(){
  const row=$("zoomrow"),z=$("zoom");
  try{const caps=track.getCapabilities?track.getCapabilities():{};
    if(caps.zoom&&caps.zoom.max>caps.zoom.min){z.min=caps.zoom.min;z.max=caps.zoom.max;z.step=caps.zoom.step||0.1;z.value=caps.zoom.min;
      row.style.display='block';z.oninput=()=>{track.applyConstraints({advanced:[{zoom:Number(z.value)}]}).catch(()=>{});};return;}
  }catch(e){}
  row.style.display='none';
}
async function toggleTorch(){
  if(!track){$("msg").innerHTML='<span class="ng">先に「開始」を押してください</span>';return;}
  try{const caps=track.getCapabilities?track.getCapabilities():{};
    if(!caps.torch){$("msg").innerHTML='<span class="ng">この端末はライト非対応</span>';return;}
    torchOn=!torchOn;await track.applyConstraints({advanced:[{torch:torchOn}]});}catch(e){}
}
// アプリ化（Service Worker登録）
if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(()=>{}); }

$("btnScan").onclick=startScan;
$("btnTorch").onclick=toggleTorch;
$("btnStop").onclick=stopScan;
$("btnNext").onclick=()=>{$("card").style.display="none";$("btnNext").style.display="none";$("stockErr").style.display="none";$("loading").style.display="none";
  $("scan").style.display="block";$("msg").textContent="商品のバーコードを読み取ってください";lastCode="";startScan();};
$("btnReset").onclick=()=>{data=null;scanned={};mode="denpyo";lastCode="";
  $("info").textContent="伝票QRを読み取ってください";$("tb").innerHTML="";$("done").style.display="none";$("msg").textContent="";};
</script>
</body>
</html>
